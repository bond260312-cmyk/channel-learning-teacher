<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 學習站｜課程總綱</title>
  <style>
    :root{--bg:#f7f8fc;--panel:#fff;--text:#17233a;--muted:#5d6b82;--line:#e6eaf2;--primary:#1865f2;--soft:#eef4ff}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
    .wrap{max-width:1080px;margin:0 auto;padding:24px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px;margin:16px 0;box-shadow:0 8px 24px rgba(23,35,58,.05)}
    h1,h2,h3,h4{margin:0 0 12px;line-height:1.2}p,li{color:var(--muted)} .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:var(--soft);color:var(--primary);font-size:12px;font-weight:700}
    .module{border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:14px}.lesson{margin-top:12px;padding:14px;border-radius:14px;background:#fafbfe;border:1px solid var(--line)}
    .btn{display:inline-block;text-decoration:none;color:#fff;background:var(--primary);padding:10px 14px;border-radius:10px;font-weight:700;margin-right:10px}.ghost{background:#fff;color:var(--text);border:1px solid var(--line)} a.link{color:var(--primary)}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="pill">課程總綱 / 公開版</div>
      <h1>AI 學習站｜課程總綱</h1>
      <p>這份總綱把整個學習路線整理成 <strong>Module → Lesson → 對應主題來源</strong>。你可以照順序完整學，也可以依照自己關心的主題跳讀。</p>
      <a class="btn" href="./index.html">回首頁</a>
      <a class="btn ghost" href="./lesson-01.html">從 Lesson 1 開始</a>
    </section>

    <section class="card">
      <h2>目前課程規模</h2>
      <ul>
        <li><strong>4 個主階段</strong></li>
        <li><strong>10 個 Module</strong></li>
        <li><strong>20 個 Lesson</strong></li>
        <li>切課原則：依概念單元整理，不硬綁一支影片只做一課</li>
      </ul>
      <p>目標頻道：<a class="link" href="https://youtube.com/@hungyileentu?si=jYgMT_z83ZHtniiq" target="_blank" rel="noreferrer">Hung-yi Lee YouTube 頻道</a></p>
    </section>
  </div>
</body>
</html>
